const edges=[];
const mainIds=['w','ox','ph','et','dep','met','eds','pkg'];
for(let i=0;i<mainIds.length-1;i++) edges.push({s:mainIds[i],t:mainIds[i+1],flow:true});

nodes.forEach(n=>{if(n.p)edges.push({s:n.p,t:n.id});});

// shared connections
[['w','cmp'],['dep','cmp'],['met','cmp'],['et','plasma'],['dep','plasma'],['dry_et','plasma'],['pecvd','plasma'],['peald','plasma'],
 ['w','clean'],['ph','clean'],['et','clean'],['dep','clean'],['met','clean'],
 ['ox','ion'],['et','ion'],['w','anneal'],['ox','anneal'],['met','anneal']].forEach(([s,t])=>edges.push({s,t}));

const nmap={};const cx=W/2,cy=H/2;
nodes.forEach(n=>{n.x=cx+Math.random()*200-100;n.y=cy+Math.random()*200-100;n.vx=0;n.vy=0;nmap[n.id]=n;});

// position main in arc
nodes.filter(n=>n.t==='m').forEach((n,i)=>{
  const ang=-Math.PI*0.75+i*(Math.PI*1.5/7);
  n.x=cx+Math.cos(ang)*240;n.y=cy+Math.sin(ang)*190;
});

let dragging=null,dragOff={x:0,y:0},hovered=null,filterMain=null;

function getConn(node){const s=new Set();edges.forEach(e=>{if(e.s===node.id)s.add(e.t);if(e.t===node.id)s.add(e.s);});return s;}

function getTree(rootId){
  const s=new Set([rootId]);
  let changed=true;
  while(changed){changed=false;edges.forEach(e=>{if(!e.flow&&s.has(e.s)&&!s.has(e.t)){s.add(e.t);changed=true;}});}
  // add shared if connected to any in tree
  nodes.filter(n=>n.t==='sh').forEach(n=>{edges.forEach(e=>{if((e.s===n.id&&s.has(e.t))||(e.t===n.id&&s.has(e.s)))s.add(n.id);});});
  return s;
}

// filter buttons
const fb=document.getElementById('filter-bar');
function mkBtn(label,id){
  const b=document.createElement('button');
  b.textContent=label;
  b.style.cssText='font-size:10px;font-family:var(--font-sans);padding:3px 8px;border-radius:10px;border:1px solid rgba(137,180,250,0.3);background:transparent;color:#bac2de;cursor:pointer;transition:all .2s';
  b.onclick=()=>{
    if(filterMain===id){filterMain=null;fb.querySelectorAll('button').forEach(x=>x.style.background='transparent');}
    else{filterMain=id;fb.querySelectorAll('button').forEach(x=>{x.style.background=x.dataset.id===id?'rgba(203,166,247,0.25)':'transparent';});}
  };
  b.dataset.id=id;
  fb.appendChild(b);
}
mkBtn('전체',null);
nodes.filter(n=>n.t==='m').forEach(n=>mkBtn(`${n.o}.${n.l}`,n.id));
fb.querySelector('button').onclick=()=>{filterMain=null;fb.querySelectorAll('button').forEach(x=>x.style.background='transparent');};

function simulate(){
  const dt=0.25;
  for(let iter=0;iter<2;iter++){
    nodes.forEach(a=>{nodes.forEach(b=>{
      if(a===b)return;
      let dx=a.x-b.x,dy=a.y-b.y,d=Math.max(Math.hypot(dx,dy),1);
      let rep=a.t==='m'&&b.t==='m'?12000:a.t==='d'&&b.t==='d'?800:2500;
      let f=rep/(d*d);a.vx+=dx/d*f*dt;a.vy+=dy/d*f*dt;
    });});
    edges.forEach(e=>{
      const a=nmap[e.s],b=nmap[e.t];if(!a||!b)return;
      let dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)||1;
      let ideal=e.flow?160:a.t==='m'?90:60;
      let f=(d-ideal)*0.004;
      a.vx+=dx/d*f*dt;a.vy+=dy/d*f*dt;
      b.vx-=dx/d*f*dt;b.vy-=dy/d*f*dt;
    });
    nodes.forEach(n=>{
      n.vx+=(cx-n.x)*0.0006;n.vy+=(cy-n.y)*0.0006;
    });
    nodes.forEach(n=>{
      if(n===dragging)return;
      n.vx*=0.82;n.vy*=0.82;
      n.x+=n.vx;n.y+=n.vy;
      n.x=Math.max(30,Math.min(W-30,n.x));
      n.y=Math.max(30,Math.min(H-30,n.y));
    });
  }
}

function toScreen(x,y){return{x:(x-cx)*zoom+cx+panX,y:(y-cy)*zoom+cy+panY};}
function toWorld(sx,sy){return{x:(sx-panX-cx)/zoom+cx,y:(sy-panY-cy)/zoom+cy};}

function draw(){
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#1e1e2e';ctx.fillRect(0,0,W,H);
  ctx.save();ctx.translate(cx+panX,cy+panY);ctx.scale(zoom,zoom);ctx.translate(-cx,-cy);

  const filterSet=filterMain?getTree(filterMain):null;
  const connSet=hovered?getConn(hovered):null;

  // edges
  edges.forEach(e=>{
    const a=nmap[e.s],b=nmap[e.t];if(!a||!b)return;
    let alpha=0.12,lw=0.6;
    if(filterSet&&!filterSet.has(e.s)&&!filterSet.has(e.t)){alpha=0.02;lw=0.3;}
    if(hovered){
      if(e.s===hovered.id||e.t===hovered.id){alpha=0.75;lw=1.8;}
      else if(!connSet||(!connSet.has(e.s)&&!connSet.has(e.t)))alpha=Math.min(alpha,0.04);
    }
    if(e.flow){ctx.strokeStyle=`rgba(243,139,168,${alpha})`;lw=hovered&&(e.s===hovered.id||e.t===hovered.id)?2.5:1.2;}
    else ctx.strokeStyle=`rgba(166,173,200,${alpha})`;
    ctx.lineWidth=lw;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
  });
  // flow arrows
  edges.filter(e=>e.flow).forEach(e=>{
    const a=nmap[e.s],b=nmap[e.t];
    let alpha=filterSet&&(!filterSet.has(e.s)||!filterSet.has(e.t))?0.03:0.3;
    if(hovered){alpha=(e.s===hovered.id||e.t===hovered.id)?0.8:0.04;}
    const mx=(a.x+b.x)/2,my=(a.y+b.y)/2,ang=Math.atan2(b.y-a.y,b.x-a.x);
    ctx.save();ctx.translate(mx,my);ctx.rotate(ang);
    ctx.fillStyle=`rgba(243,139,168,${alpha})`;
    ctx.beginPath();ctx.moveTo(7,0);ctx.lineTo(-5,-5);ctx.lineTo(-5,5);ctx.closePath();ctx.fill();
    ctx.restore();
  });
  // nodes
  nodes.forEach(n=>{
    let alpha=1,glow=0;
    if(filterSet&&!filterSet.has(n.id)){alpha=0.08;}
    if(hovered){
      if(n===hovered){alpha=1;glow=14;}
      else if(connSet&&connSet.has(n.id)){alpha=0.95;glow=6;}
      else alpha=Math.min(alpha,0.15);
    }
    ctx.globalAlpha=alpha;
    if(glow>0){ctx.shadowColor=n.c;ctx.shadowBlur=glow;}
    ctx.fillStyle=n.c;
    ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    // inner circle
    ctx.fillStyle=`rgba(30,30,46,${n.t==='m'?0.45:n.t==='d'?0.2:0.35})`;
    ctx.beginPath();ctx.arc(n.x,n.y,n.r*0.55,0,Math.PI*2);ctx.fill();
    // label
    ctx.fillStyle='#cdd6f4';
    const fs=n.t==='m'?12:n.t==='s'?10:9;
    ctx.font=(n.t==='m'?'500 ':'400 ')+fs+'px "Anthropic Sans",sans-serif';
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(n.l,n.x,n.y+n.r+3);
    // order badge for main
    if(n.t==='m'){
      ctx.font='600 10px "Anthropic Sans",sans-serif';
      ctx.fillStyle=`rgba(30,30,46,0.8)`;
      ctx.textBaseline='middle';
      ctx.fillText(n.o,n.x,n.y);
    }
    ctx.globalAlpha=1;
  });
  ctx.restore();
}

function loop(){simulate();draw();requestAnimationFrame(loop);}
loop();

function getPos(e){const r=canvas.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};}
function findNode(p){
  const wp=toWorld(p.x,p.y);
  for(let i=nodes.length-1;i>=0;i--){
    if(Math.hypot(wp.x-nodes[i].x,wp.y-nodes[i].y)<=nodes[i].r+6)return nodes[i];
  }
  return null;
}

let isPanning=false,panStart={x:0,y:0};
canvas.addEventListener('mousedown',e=>{
  const p=getPos(e);const n=findNode(p);
  if(n){dragging=n;const wp=toWorld(p.x,p.y);dragOff={x:n.x-wp.x,y:n.y-wp.y};n.vx=0;n.vy=0;container.style.cursor='grabbing';}
  else{isPanning=true;panStart={x:p.x-panX,y:p.y-panY};container.style.cursor='grabbing';}
});
canvas.addEventListener('mousemove',e=>{
  const p=getPos(e);
  if(dragging){const wp=toWorld(p.x,p.y);dragging.x=wp.x+dragOff.x;dragging.y=wp.y+dragOff.y;return;}
  if(isPanning){panX=p.x-panStart.x;panY=p.y-panStart.y;return;}
  const n=findNode(p);
  if(n!==hovered){
    hovered=n;
    if(n){
      canvas.style.cursor='pointer';tooltip.style.display='block';
      const tier=n.t==='m'?'주요 공정':n.t==='s'?'세부 공정':n.t==='d'?'상세 기술':'공유 기술';
      tooltip.innerHTML=`<strong style="font-size:13px">${n.l}</strong><br><span style="color:#a6adc8;font-size:11px">${tier}</span><br><span style="color:#bac2de">${n.d}</span>`;
    }else{canvas.style.cursor='grab';tooltip.style.display='none';}
  }
  if(hovered){tooltip.style.left=Math.min(p.x+14,W-230)+'px';tooltip.style.top=(p.y-10)+'px';}
});
canvas.addEventListener('mouseup',()=>{dragging=null;isPanning=false;container.style.cursor=hovered?'pointer':'grab';});
canvas.addEventListener('mouseleave',()=>{dragging=null;isPanning=false;hovered=null;tooltip.style.display='none';container.style.cursor='grab';});

canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const p=getPos(e);
  const wp=toWorld(p.x,p.y);
  const dz=e.deltaY>0?0.9:1.1;
  zoom=Math.max(0.3,Math.min(3,zoom*dz));
},{passive:false});

canvas.addEventListener('click',e=>{
  const p=getPos(e);const n=findNode(p);
  if(n&&n.t==='m'){
    if(filterMain===n.id)filterMain=null;
    else filterMain=n.id;
    fb.querySelectorAll('button').forEach(x=>{x.style.background=x.dataset.id===filterMain?'rgba(203,166,247,0.25)':'transparent';});
  }
});

canvas.addEventListener('touchstart',e=>{e.preventDefault();const p=getPos(e);const n=findNode(p);if(n){dragging=n;const wp=toWorld(p.x,p.y);dragOff={x:n.x-wp.x,y:n.y-wp.y};}else{isPanning=true;panStart={x:p.x-panX,y:p.y-panY};}},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();const p=getPos(e);if(dragging){const wp=toWorld(p.x,p.y);dragging.x=wp.x+dragOff.x;dragging.y=wp.y+dragOff.y;}else if(isPanning){panX=p.x-panStart.x;panY=p.y-panStart.y;}},{passive:false});
canvas.addEventListener('touchend',()=>{dragging=null;isPanning=false;});
window.addEventListener('resize',resize);
</script>
